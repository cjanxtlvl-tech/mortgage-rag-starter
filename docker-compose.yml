services:
  rag-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    env_file:
      - .env
    environment:
      ENVIRONMENT: production
      HOST: 0.0.0.0
      PORT: 8000
    networks:
      - mortgage_ai_network
    restart: unless-stopped

networks:
  mortgage_ai_network:
    external: true
    name: mortgage_ai_network
