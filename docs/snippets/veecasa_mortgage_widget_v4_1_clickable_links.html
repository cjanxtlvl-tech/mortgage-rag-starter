  /* ── Vacuum close ────────────────────────────────────────── */
  function vcClose(){
    if(!isOpen) return; isOpen=false;
    var winRect=chatWin.getBoundingClientRect(), btnRect=launcher.getBoundingClientRect();
    var dx=(btnRect.left+btnRect.width/2)-(winRect.left+winRect.width/2);
    var dy=(btnRect.top+btnRect.height/2)-(winRect.top+winRect.height/2);
    var btnCX=btnRect.left+btnRect.width/2, btnCY=btnRect.top+btnRect.height/2;
    chatWin.style.position='fixed'; chatWin.style.top=winRect.top+'px';
    chatWin.style.left=winRect.left+'px'; chatWin.style.bottom='auto';
    chatWin.style.width=winRect.width+'px'; chatWin.style.height=winRect.height+'px';
    chatWin.style.transform='none'; chatWin.style.transition='none';
    chatWin.classList.remove('vc-visible'); backdrop.classList.remove('vc-visible');
    var dur=500;
    chatWin.animate([
      {transform:'translate(0,0) scale(1)',opacity:1,borderRadius:'20px',filter:'blur(0px)'},
      {transform:'translate('+(dx*0.4)+'px,'+(dy*0.4)+'px) scale(0.68,0.55) skewX(5deg)',opacity:0.85,borderRadius:'26px',filter:'blur(1px)',offset:0.42},
      {transform:'translate('+(dx*0.75)+'px,'+(dy*0.75)+'px) scale(0.25,0.15) skewX(12deg)',opacity:0.5,borderRadius:'44px',filter:'blur(3px)',offset:0.72},
      {transform:'translate('+dx+'px,'+dy+'px) scale(0)',opacity:0,borderRadius:'80px',filter:'blur(10px)'}
    ],{duration:dur,easing:'cubic-bezier(0.55,0.0,1.0,0.6)',fill:'forwards'});
    setTimeout(function(){
      chatWin.classList.remove('vc-open'); backdrop.classList.remove('vc-open'); chatWin.style.cssText='';
      launcher.classList.remove('vc-absorb'); void launcher.offsetWidth; launcher.classList.add('vc-absorb');
      setTimeout(function(){ launcher.classList.remove('vc-absorb'); },600);
      for(var r=0;r<3;r++){
        (function(d){ setTimeout(function(){
          var rip=document.createElement('div'); rip.className='vc-ripple';
          rip.style.left=btnCX+'px'; rip.style.top=btnCY+'px';
          document.body.appendChild(rip); setTimeout(function(){ rip.remove(); },800);
        },d); })(r*110);
      }
    },dur-20);
  }

  launcher.addEventListener('click',function(){ isOpen?vcClose():vcOpen(); });
  closeBtn.addEventListener('click',vcClose);
  backdrop.addEventListener('click',vcClose);

  /* ── Auto-open on home page only ────────────────────────── */
  var path = window.location.pathname;
  if(path === '/' || path === '/index.html' || path === '/index.php') {
    vcOpen();
  }

  /* ── Greet ───────────────────────────────────────────────── */
  function vcGreet(){
    vcShowTyping();
    fetch(RASA_URL,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({sender:sessionId,message:'hello',metadata:getMetadata()})})
    .then(function(r){ return r.json(); })
    .then(function(res){
      vcHideTyping();
      if(!res||!res.length){ vcBotMessage("Hi! 😊 I'm your Mortgage Assistant. How can I help?",[]);return; }
      res.forEach(function(resp,idx){ setTimeout(function(){
        vcBotMessage(resp.text||'',idx===res.length-1?(resp.buttons||[]):[]);
        if(idx===res.length-1&&resp.text) vcSpeak(resp.text);
      },idx*600); });
    })
    .catch(function(){
      vcHideTyping();
      vcBotMessage("Hi there! 😊 I'm your Mortgage Assistant — here to guide you through your home financing journey. What brings you here today?",[
        {title:'🏠 Buy a Home',payload:'/select_buy_home'},
        {title:'💰 Refinance My Mortgage',payload:'/select_refinance'},
        {title:'📈 Investment / Rental',payload:'/select_investment'},
        {title:'🏢 Commercial / SBA',payload:'/select_commercial'},
        {title:'⚡ Hard Money / Fix & Flip',payload:'/select_hard_money'},
        {title:'❓ Ask a Question',payload:'/ask_how_process_works'},
        {title:'📞 Talk to a Loan Officer',payload:'/speak_to_loan_officer'}
      ]);
    });
  }

  /* ── Send ────────────────────────────────────────────────── */
  function vcSend(textOverride,payloadOverride){
    var text=textOverride!==undefined?textOverride:input.value.trim();
    var payload=payloadOverride||text;
    if(!text) return;
    input.value=''; messageCount++;
    vcUserMessage(text); vcShowTyping();
    fetch(RASA_URL,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({sender:sessionId,message:payload,metadata:getMetadata()})})
    .then(function(r){ return r.json(); })
    .then(function(res){
      vcHideTyping();
      if(!res||!res.length){
        vcBotMessage("I didn't quite understand that. Please rephrase or choose an option:",[
          {title:'🏠 Buy a Home',payload:'/select_buy_home'},
          {title:'💰 Refinance',payload:'/select_refinance'},
          {title:'📞 Talk to a Loan Officer',payload:'/speak_to_loan_officer'}
        ]); return;
      }
      res.forEach(function(resp,idx){ setTimeout(function(){
        vcBotMessage(resp.text||'',idx===res.length-1?(resp.buttons||[]):[]);
        if(idx===res.length-1&&resp.text) vcSpeak(resp.text);
      },idx*600); });
    })
    .catch(function(){ vcHideTyping(); vcBotMessage('Connection issue. Please try again.',[]); });
  }
  sendBtn.addEventListener('click',function(){ vcSend(); });
  input.addEventListener('keydown',function(e){ if(e.key==='Enter') vcSend(); });

  /* ── DOM helpers ─────────────────────────────────────────── */
  function vcUserMessage(text){
    var row=document.createElement('div'); row.className='vc-msg-row vc-user';
    var bub=document.createElement('div'); bub.className='vc-bubble vc-user-bubble'; bub.textContent=text;
    row.appendChild(bub); messages.appendChild(row); messages.scrollTop=messages.scrollHeight;
  }
  function vcBotMessage(text,buttons){
    if(text){
      var row=document.createElement('div'); row.className='vc-msg-row';
      var bub=document.createElement('div'); bub.className='vc-bubble vc-bot-bubble';

      var urlMatch = text.match(/https?:\/\/[^\s<]+/);
      var cleanText = text;

      if (urlMatch) {
        cleanText = cleanText.replace(urlMatch[0], '').trim();
        cleanText = cleanText.replace(/👉\s*Learn more:\s*$/i, '').trim();
        cleanText = cleanText.replace(/Learn more:\s*$/i, '').trim();
        cleanText = cleanText.replace(/Source:\s*$/i, '').trim();
      }

      bub.innerHTML=cleanText.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');

      if (urlMatch) {
        var link = document.createElement('a');
        link.href = urlMatch[0];
        link.target = '_blank';
        link.rel = 'noopener noreferrer';
        link.style.cssText = 'display:inline-block!important;margin-top:10px!important;padding:8px 14px!important;border-radius:999px!important;border:2px solid #2563eb!important;color:#2563eb!important;font-weight:700!important;text-decoration:none!important;';
        link.textContent = '👉 Learn More';

        link.addEventListener('mouseenter', function() {
          link.style.background = '#2563eb';
          link.style.color = 'white';
        });

        link.addEventListener('mouseleave', function() {
          link.style.background = 'transparent';
          link.style.color = '#2563eb';
        });

        bub.appendChild(document.createElement('br'));
        bub.appendChild(link);
      }

      row.appendChild(makeBotAvatar()); row.appendChild(bub); messages.appendChild(row);
    }
    if(buttons&&buttons.length){
      var wrap=document.createElement('div'); wrap.className='vc-btns-wrap';
      buttons.forEach(function(btn){
        var b=document.createElement('button'); b.className='vc-qr-btn'; b.textContent=btn.title;
        b.addEventListener('click',function(){
          shadow.querySelectorAll('.vc-btns-wrap').forEach(function(w){ w.remove(); });
          vcSend(btn.title,btn.payload);
        }); wrap.appendChild(b);
      }); messages.appendChild(wrap);
    }
    messages.scrollTop=messages.scrollHeight;
  }
  function vcShowTyping(){
    var row=document.createElement('div'); row.className='vc-msg-row';
    var t=document.createElement('div'); t.className='vc-typing-wrap';
    [1,2,3].forEach(function(){ var d=document.createElement('div'); d.className='vc-dot'; t.appendChild(d); });
    row.appendChild(makeBotAvatar()); row.appendChild(t); typingEl=row; messages.appendChild(row);
    messages.scrollTop=messages.scrollHeight;
  }
  function vcHideTyping(){ if(typingEl){ typingEl.remove(); typingEl=null; } }

  /* ══════════════════════════════════════════════════════════
     MICROPHONE — v4 clean approach
  ══════════════════════════════════════════════════════════ */
  var SR          = window.SpeechRecognition || window.webkitSpeechRecognition;
  var hasSTT      = !!SR;
  var hasTTS      = ('speechSynthesis' in window);
  var isListening = false;
  var voiceOutputOn = true;
  var recognition   = null;

  function buildRec(){
    if(!SR) return null;
    var r = new SR();
    r.lang='en-US'; r.continuous=false; r.interimResults=true; r.maxAlternatives=1;
    r.onstart = function(){
      isListening=true; micBtn.textContent='🔴';
      micBtn.classList.add('vc-listening'); micBtn.title='Recording… tap to stop';
      showListeningBubble();
    };
    r.onend = function(){
      isListening=false; micBtn.textContent='🎤';
      micBtn.classList.remove('vc-listening'); micBtn.title='Click to speak';
      removeListeningBubble();
      recognition = buildRec();
    };
    r.onerror = function(e){
      isListening=false; micBtn.textContent='🎤';
      micBtn.classList.remove('vc-listening'); removeListeningBubble();
      recognition = buildRec();
      if(e.error==='not-allowed'||e.error==='service-not-allowed'){ showMicBanner(); }
      else if(e.error==='no-speech'){ vcBotMessage("Didn't hear anything — tap 🎤 and speak clearly.",[]);}
      else if(e.error==='network'){   vcBotMessage('🎤 Voice recognition needs an active internet connection.',[]);}
      else if(e.error==='audio-capture'){ vcBotMessage('🎤 No microphone detected on this device.',[]);}
    };
    r.onresult = function(event){
      var f='',i='';
      for(var n=event.resultIndex;n<event.results.length;n++){
        if(event.results[n].isFinal) f+=event.results[n][0].transcript;
        else i+=event.results[n][0].transcript;
      }
      if(f||i) input.value=f||i;
      if(f.trim()){ r.stop(); input.value=''; vcSend(f.trim()); }
    };
    return r;
  }
  recognition = buildRec();

  function showMicBanner(){
    var row=document.createElement('div'); row.className='vc-msg-row';
    var b=document.createElement('div'); b.className='vc-mic-banner';
    b.innerHTML='🎤 <strong>Microphone blocked.</strong><br>Click the <strong>🔒 lock icon</strong> in your browser address bar → <em>Site Settings</em> → set Microphone to <strong>Allow</strong>, then <strong>refresh the page</strong>.';
    row.appendChild(makeBotAvatar()); row.appendChild(b);
    messages.appendChild(row); messages.scrollTop=messages.scrollHeight;
  }

  micBtn.addEventListener('click',function(){
    if(!isOpen) vcOpen();
    if(!hasSTT){ alert('🎤 Voice input works best in Google Chrome or Microsoft Edge.'); return; }
    if(isListening){
      try{ recognition.stop(); } catch(e){}
    } else {
      if(!recognition) recognition=buildRec();
      try{ recognition.start(); }
      catch(e){
        recognition=buildRec();
        setTimeout(function(){ try{ recognition.start(); }catch(e2){} },200);
      }
    }
  });

  voiceBtn.addEventListener('click',function(){
    voiceOutputOn=!voiceOutputOn;
    voiceBtn.textContent=voiceOutputOn?'🔊':'🔇';
    voiceBtn.title=voiceOutputOn?'Bot voice on — click to mute':'Muted — click to unmute';
    voiceBtn.classList.toggle('vc-muted',!voiceOutputOn);
    if(!voiceOutputOn&&hasTTS) window.speechSynthesis.cancel();
  });

  function showListeningBubble(){
    removeListeningBubble();
    var row=document.createElement('div'); row.className='vc-msg-row'; row.id='vc-listening-row';
    var bub=document.createElement('div'); bub.className='vc-listening-bubble'; bub.textContent='🎤 Listening… speak now';
    row.appendChild(makeBotAvatar()); row.appendChild(bub); messages.appendChild(row); listeningRow=row;
    messages.scrollTop=messages.scrollHeight;
  }
  function removeListeningBubble(){
    if(listeningRow){ listeningRow.remove(); listeningRow=null; }
    var el=shadow.getElementById('vc-listening-row'); if(el) el.remove();
  }

  /* ── TTS ─────────────────────────────────────────────────── */
  function vcSpeak(text){
    if(!hasTTS||!voiceOutputOn) return;
    window.speechSynthesis.cancel();
    var clean=text.replace(/[\u{1F000}-\u{1FFFF}]/gu,'').replace(/[\u2600-\u27BF]/g,'')
      .replace(/\*\*(.+?)\*\*/g,'$1').replace(/\*/g,'').replace(/→/g,', ')
      .replace(/\n/g,'. ').replace(/\s+/g,' ').trim();
    if(!clean) return;
    if(clean.length>280) clean=clean.substring(0,280)+'...';
    var utt=new SpeechSynthesisUtterance(clean);
    utt.lang='en-US'; utt.rate=0.95; utt.pitch=1.0; utt.volume=1.0;
    function go(){
      var vs=window.speechSynthesis.getVoices();
      var best=vs.find(function(v){ return v.name==='Google US English'; })||
               vs.find(function(v){ return v.name.indexOf('Microsoft Aria')!==-1; })||
               vs.find(function(v){ return v.lang==='en-US'&&v.localService; })||
               vs.find(function(v){ return v.lang==='en-US'; })||null;
      if(best) utt.voice=best; window.speechSynthesis.speak(utt);
    }
    if(window.speechSynthesis.getVoices().length>0) go();
    else window.speechSynthesis.onvoiceschanged=go;
  }

})();
</script>
